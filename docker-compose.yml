services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqli-arena-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SqliArena2026!"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "SqliArena2026!" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: sqli-arena-oracle
    environment:
      ORACLE_PASSWORD: "SqliArena2026"
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    restart: unless-stopped
    healthcheck:
      test: healthcheck.sh
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  mongodb:
    image: mongo:7
    container_name: sqli-arena-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: sqli_arena
      MONGO_INITDB_ROOT_PASSWORD: sqli_arena_2026
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: mongosh --username sqli_arena --password sqli_arena_2026 --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: sqli-arena-redis
    command: redis-server --requirepass sqli_arena_2026
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: redis-cli -a sqli_arena_2026 ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  hql:
    build:
      context: ./docker/hql
      dockerfile: Dockerfile
    container_name: sqli-arena-hql
    ports:
      - "8081:8080"
    restart: unless-stopped
    healthcheck:
      test: wget -q --spider http://localhost:8080/actuator/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  graphql:
    build:
      context: ./docker/graphql
      dockerfile: Dockerfile
    container_name: sqli-arena-graphql
    ports:
      - "4000:4000"
    restart: unless-stopped
    healthcheck:
      test: wget -q --spider http://127.0.0.1:4000/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mssql-data:
  oracle-data:
  mongodb-data:
  redis-data:
